<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="section_formularios">    
        <h1>Cadrastro 📫</h1>
        <p>Cadastre-se e receba nossa Newsletter</p><br><br>
    <form>
        <section>
            <label for="name">Nome: </label>
            <input type="text" name="nome" required placeholder="Digite seu nome"><br><br>
            <label for="email">E-mail: </label>
            <input type="email" required placeholder="Digite seu E-mail"><br><br>
            <label for="telefone">Telefone: </label>
            <input type="tel" required placeholder="Digite seu telefone"><br><br>
            <label for="datanascimento">Data de Nascimento: </label>
            <input type="date"><br><br>
        </section>

        <section>
            <h3>Endereço</h3>
            <label for="rua">Rua: </label>
            <input type="text" required><br><br>
            <label for="numero">Nº: </label>
            <input type="number" required><br><br>
            <label for="bairro">Bairro: </label>
            <input type="text" required><br><br>
            <label for="cep">CEP: </label>
            <input type="number" required><br><br>
        </section>

            <h3 class="alinhamento">Produtos favoritos</h3>

        <section class="sec_inputs">
            
            <input type="checkbox" name="produtosfavoritos">
            <label for="produtosfavoritos">Pães</label>
            <input type="checkbox" name="produtosfavoritos">
            <label for="produtosfavoritos">Bolos</label>
            <input type="checkbox" name="produtosfavoritos">
            <label for="produtosfavoritos">Doces</label>
            <input type="checkbox" name="produtosfavoritos">
            <label for="produtosfavoritos">Salgados</label>
            <input type="checkbox" name="produtosfavoritos">
            <label for="produtosfavoritos">Bebidas</label>
        </section>

        <h3 class="alinhamento">Aceita receber promoções por e-mail?</h3>

        <section class="sec_inputs">
            
            <input type="radio" name="aceita" id="aceita" value="sim" required>
            <label for="aceita">SIM</label>
            <input type="radio" name="aceita" id="nao" value="nao" required>
            <label for="aceita">NÃO</label><br><br>
        </section>
        
        <section id="sec_botoes">
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
        <button type="button" onclick="window.location.href='index.html'">Voltar a página inicial</button>
        </section>
    </form>    
    </section>
    
    
</body>
</html>
